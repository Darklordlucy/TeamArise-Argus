<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArgusAI — SOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #1A1A2E;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        h1  { font-size: 22px; color: #E94560; letter-spacing: 2px; }
        p   { font-size: 14px; color: #9CA3AF; text-align: center; padding: 0 32px; }

        #sos-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #E94560;
            background: #E94560;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
        }

        #sos-btn:active   { background: #c73652; transform: scale(0.96); }
        #sos-btn:disabled { background: #6B7280; border-color: #6B7280; cursor: not-allowed; }

        #status { font-size: 15px; color: #9CA3AF; text-align: center; min-height: 24px; }
        #status.success { color: #34D399; }
        #status.error   { color: #F87171; }
    </style>
</head>
<body>

    <h1>ARGUS AI</h1>
    <p>Press the button to send your crash location to the live map and emergency contacts.</p>

    <button id="sos-btn" onclick="sendSOS()">SOS</button>

    <div id="status">Ready</div>

<script>
    const BACKEND_URL = "http://localhost:8001";

    // ── Replace with actual venue coords before demo day ──
    // To get coords: Google Maps → long press your location → copy the numbers
    const FALLBACK_LAT = 18.9940;
    const FALLBACK_LNG = 73.1190;

    async function postCrash(lat, lng) {
        const res = await fetch(`${BACKEND_URL}/api/crashes`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                device_id: "argus-device-01",
                lat: lat,
                lng: lng,
                sms_sent: true
            })
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
    }

    async function sendSOS() {
        const btn    = document.getElementById("sos-btn");
        const status = document.getElementById("status");

        btn.disabled       = true;
        status.className   = "";
        status.textContent = "Getting your location...";

        if (!navigator.geolocation) {
            status.textContent = "Geolocation not supported on this browser.";
            status.className   = "error";
            btn.disabled       = false;
            return;
        }

        navigator.geolocation.getCurrentPosition(
            // GPS success — use real phone location
            async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                status.textContent = `Location: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                try {
                    await postCrash(lat, lng);
                    status.textContent = "✓ SOS Sent — Location live on ArgusAI map";
                    status.className   = "success";
                } catch (err) {
                    status.textContent = "Failed to send. Check backend.";
                    status.className   = "error";
                    btn.disabled       = false;
                }
            },
            // GPS failed — use hardcoded venue coords
            async () => {
                status.textContent = "GPS unavailable — using venue location...";
                try {
                    await postCrash(FALLBACK_LAT, FALLBACK_LNG);
                    status.textContent = "✓ SOS Sent — Location live on ArgusAI map";
                    status.className   = "success";
                } catch (err) {
                    status.textContent = "Failed to send. Check backend.";
                    status.className   = "error";
                    btn.disabled       = false;
                }
            },
            { timeout: 8000, enableHighAccuracy: true }
        );
    }
</script>

</body>
</html>
